name: Latest blog posts

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/scripts/update_medium_posts.py'

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest Medium posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate post cards
        run: python .github/scripts/update_medium_posts.py

      - name: Commit changes
        run: |
          git config --local user.email "blog-post-bot@users.noreply.github.com"
          git config --local user.name "blog-post-bot"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update latest Medium posts"
          git push

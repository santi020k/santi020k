name: Generate Snake Animation

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate contribution snake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: santi020k
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ffffff&color_dots=#1a1a1a,#333333,#555555,#888888,#ffffff
            dist/github-contribution-grid-snake-dark.svg?color_snake=ffffff&color_dots=#1a1a1a,#333333,#555555,#888888,#ffffff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
